name: i18n_extension
description: Translation and Internationalization (i18n) for Flutter. Easy to use for both large and small projects. Uses Dart extensions to reduce boilerplate.
version: 15.1.0
publish_to: 'none' # Remove this line if you wish to publish to pub.dev 
# author: Marcelo Glasberg <marcglasberg@gmail.com>
homepage: https://github.com/marcglasberg/i18n_extension
topics:
  - internationalization
  - localization
  - translation
  - i18n
  - extension

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  gettext_parser: ^0.2.0
  intl: ^0.20.2
  i18n_extension_core: ^5.0.2
  http: ^1.6.0
  shared_preferences:
    git: https://github.com/kumsumit/shared_preferences.git
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.24.9
